<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LordvinCidev · Termux A–Z</title>
    <!-- Favicon as inline SVG -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230d1117'/%3E%3Ctext x='50' y='72' font-size='70' text-anchor='middle' font-family='monospace' fill='%2300f0ff'%3E%3C/t%3E%3Ctext x='50' y='72' font-size='70' text-anchor='middle' font-family='monospace' fill='%23ff44ff'%3E%3C/t%3E%3C/svg%3E" />
    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background: #0b0e14;
            color: #e0e6f0;
            font-family: 'Segoe UI', 'Fira Code', monospace, system-ui;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #121820;
        }
        ::-webkit-scrollbar-thumb {
            background: #00f0ff;
            border-radius: 20px;
            box-shadow: 0 0 20px #00f0ff66;
        }

        /* ── animated bg glow ── */
        .bg-glow {
            position: fixed;
            top: -40%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(ellipse, #00f0ff08 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: drift 18s infinite alternate ease-in-out;
        }
        .bg-glow-2 {
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, #ff44ff08 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: drift 22s infinite alternate-reverse ease-in-out;
        }
        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(6%, 8%) scale(1.2);
            }
        }

        /* ── container ── */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px 60px;
        }

        /* ── header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            padding: 28px 0 20px;
            border-bottom: 1px solid #1f2a36;
            gap: 16px;
            backdrop-filter: blur(4px);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #00f0ff, #7b2ffc);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: #0b0e14;
            box-shadow: 0 0 30px #00f0ff44, 0 0 60px #7b2ffc22;
            transition: transform 0.3s ease;
        }
        .logo-icon:hover {
            transform: scale(1.05) rotate(-2deg);
        }
        .logo-text {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #00f0ff, #a855f7, #ff44ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px #00f0ff33;
        }
        .logo-text span {
            font-weight: 300;
            color: #7a8a9e;
            -webkit-text-fill-color: #7a8a9e;
            background: none;
        }
        .header-tagline {
            font-size: 13px;
            color: #7a8a9e;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid #1f2a36;
            padding: 6px 16px;
            border-radius: 40px;
            background: #121a24;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 0 20px #00f0ff08;
        }

        /* ── search ── */
        .search-wrap {
            margin: 28px 0 32px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-wrap input {
            flex: 1;
            min-width: 220px;
            padding: 14px 22px;
            border-radius: 60px;
            border: 1px solid #1f2a36;
            background: #0f1620;
            color: #e0e6f0;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px #00f0ff08;
            outline: none;
        }
        .search-wrap input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 40px #00f0ff22, inset 0 0 20px #00f0ff08;
        }
        .search-wrap input::placeholder {
            color: #4a5a6e;
        }
        .search-wrap .badge-count {
            background: #1a2633;
            padding: 8px 22px;
            border-radius: 60px;
            font-size: 14px;
            color: #7a8a9e;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #1f2a36;
            white-space: nowrap;
        }
        .search-wrap .badge-count strong {
            color: #00f0ff;
            font-weight: 600;
        }

        /* ── category tabs ── */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 32px;
            border-bottom: 1px solid #1a2430;
            padding-bottom: 12px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #7a8a9e;
            font-family: inherit;
            font-size: 14px;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 500;
            letter-spacing: 0.3px;
            border: 1px solid transparent;
        }
        .tab-btn:hover {
            color: #e0e6f0;
            background: #1a2633;
        }
        .tab-btn.active {
            color: #00f0ff;
            background: #00f0ff12;
            border-color: #00f0ff44;
            box-shadow: 0 0 30px #00f0ff11;
        }
        .tab-btn .tab-icon {
            margin-right: 6px;
        }

        /* ── cards grid ── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 6px;
        }

        /* ── card ── */
        .card {
            background: #10171f;
            border-radius: 20px;
            padding: 20px 22px 22px;
            border: 1px solid #1a2633;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(2px);
            box-shadow: 0 8px 30px #00000044;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #00f0ff, #a855f7, #ff44ff);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: #2a3a4a;
            box-shadow: 0 12px 50px #00f0ff0a, 0 0 60px #7b2ffc08;
        }
        .card:hover::before {
            opacity: 1;
        }
        .card .cmd {
            font-family: 'Fira Code', monospace;
            font-size: 17px;
            font-weight: 600;
            color: #00f0ff;
            letter-spacing: -0.2px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .card .cmd .badge {
            font-size: 10px;
            font-weight: 600;
            background: #1a2a3a;
            color: #7a9ab0;
            padding: 0 12px;
            border-radius: 40px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif;
        }
        .card .cmd .premium-badge {
            background: #fbbf24;
            color: #0b0e14;
            padding: 0 10px;
            border-radius: 40px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .card .desc {
            color: #b0c0d0;
            font-size: 14px;
            margin: 6px 0 10px;
            line-height: 1.5;
        }
        .card .example {
            background: #0a1119;
            padding: 10px 14px;
            border-radius: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #a0b8d0;
            border-left: 3px solid #00f0ff44;
            margin-top: 6px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            transition: all 0.3s ease;
        }
        .card .example .hl {
            color: #ff44ff;
        }
        .card .example .hl2 {
            color: #fbbf24;
        }
        .card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }
        .card .tags span {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #1a2430;
            color: #6a8a9e;
            padding: 2px 12px;
            border-radius: 40px;
            border: 1px solid #1f2a36;
        }
        .card .tags .tag-green {
            color: #4ade80;
            border-color: #4ade8033;
        }
        .card .tags .tag-purple {
            color: #c084fc;
            border-color: #c084fc33;
        }
        .card .tags .tag-cyan {
            color: #22d3ee;
            border-color: #22d3ee33;
        }
        .card .tags .tag-pink {
            color: #f472b6;
            border-color: #f472b633;
        }

        /* ── premium lock overlay ── */
        .card.premium-locked {
            position: relative;
            cursor: pointer;
            border-color: #fbbf2444;
        }
        .card.premium-locked .lock-overlay {
            position: absolute;
            inset: 0;
            background: rgba(11, 14, 20, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            color: #fbbf24;
            font-size: 16px;
            gap: 8px;
            transition: all 0.3s ease;
            z-index: 2;
        }
        .card.premium-locked .lock-overlay .lock-icon {
            font-size: 36px;
        }
        .card.premium-locked .lock-overlay .unlock-hint {
            font-size: 13px;
            color: #7a8a9e;
            background: #1a2633;
            padding: 4px 16px;
            border-radius: 40px;
            border: 1px solid #fbbf2444;
        }
        .card.premium-locked .lock-overlay .unlock-hint:hover {
            background: #fbbf2422;
        }
        .card.premium-locked .example,
        .card.premium-locked .tags {
            filter: blur(3px);
            pointer-events: none;
            user-select: none;
        }

        /* ── no results ── */
        .no-results {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: #5a6a7e;
            font-size: 18px;
            grid-column: 1 / -1;
        }
        .no-results.show {
            display: block;
        }

        /* ── footer ── */
        .footer {
            margin-top: 56px;
            padding-top: 28px;
            border-top: 1px solid #1a2430;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            color: #4a5a6e;
            font-size: 14px;
        }
        .footer a {
            color: #00f0ff;
            text-decoration: none;
            border-bottom: 1px dotted transparent;
            transition: border-color 0.2s;
        }
        .footer a:hover {
            border-color: #00f0ff66;
        }
        .footer .love {
            color: #ff44ff;
        }

        /* ── animations ── */
        .card {
            opacity: 0;
            animation: fadeUp 0.5s ease forwards;
        }
        /* animation delays omitted for brevity (same as before) */
        .card:nth-child(1) { animation-delay: 0.02s; }
        .card:nth-child(2) { animation-delay: 0.04s; }
        /* ... we can keep the pattern but will be generated by JS anyway, not necessary to list all */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(24px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ── responsive ── */
        @media (max-width: 700px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .logo-text {
                font-size: 20px;
            }
            .header-tagline {
                font-size: 11px;
                padding: 4px 14px;
            }
            .tabs {
                gap: 4px;
            }
            .tab-btn {
                font-size: 12px;
                padding: 6px 12px;
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .search-wrap input {
                font-size: 14px;
                padding: 12px 18px;
            }
            .search-wrap .badge-count {
                font-size: 12px;
                padding: 6px 16px;
            }
        }
        @media (max-width: 480px) {
            .container {
                padding: 0 14px 40px;
            }
            .card {
                padding: 16px 16px 18px;
            }
            .card .cmd {
                font-size: 15px;
                flex-wrap: wrap;
            }
            .card .example {
                font-size: 12px;
                padding: 8px 12px;
            }
        }

        /* ── scroll indicator ── */
        .scroll-top {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #00f0ff22;
            backdrop-filter: blur(12px);
            border: 1px solid #00f0ff44;
            color: #00f0ff;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px #00f0ff11;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
        }
        .scroll-top.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .scroll-top:hover {
            background: #00f0ff33;
            border-color: #00f0ff88;
            transform: scale(1.08);
        }

        /* ── modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-box {
            background: #121a24;
            border: 1px solid #2a3a4a;
            border-radius: 24px;
            padding: 40px 36px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 80px #00000088;
            text-align: center;
        }
        .modal-box h2 {
            color: #fbbf24;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .modal-box p {
            color: #7a8a9e;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .modal-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid #1f2a36;
            background: #0f1620;
            color: #e0e6f0;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.3s;
        }
        .modal-box input:focus {
            border-color: #fbbf24;
        }
        .modal-box .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .modal-box .modal-actions button {
            padding: 10px 28px;
            border-radius: 60px;
            border: none;
            background: #fbbf24;
            color: #0b0e14;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .modal-box .modal-actions button:hover {
            transform: scale(1.04);
            box-shadow: 0 0 30px #fbbf2444;
        }
        .modal-box .modal-actions button.cancel {
            background: #1a2633;
            color: #7a8a9e;
        }
        .modal-box .modal-actions button.cancel:hover {
            background: #2a3a4a;
            box-shadow: none;
        }
        .modal-box .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }
        .modal-box .success-msg {
            color: #4ade80;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }
        /* ── utility ── */
        .text-glow {
            text-shadow: 0 0 30px #00f0ff22;
        }
        .flex-center {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mt-1 {
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <!-- background glows -->
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <!-- scroll to top -->
    <div class="scroll-top" id="scrollTop" title="Back to top">↑</div>

    <!-- modal -->
    <div class="modal-overlay" id="premiumModal">
        <div class="modal-box">
            <h2>🔒 Premium Access</h2>
            <p>Enter the password to unlock premium tools.</p>
            <input type="password" id="passwordInput" placeholder="Enter password..." autocomplete="off" />
            <div id="modalError" class="error-msg"></div>
            <div class="modal-actions">
                <button id="modalUnlockBtn">Unlock</button>
                <button class="cancel" id="modalCancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <div class="container">

        <!-- header -->
        <header class="header">
            <div class="logo-area">
                <div class="logo-icon">⌘</div>
                <div class="logo-text">Lordvin<span>Cidev</span></div>
            </div>
            <div class="header-tagline">⚡ Termux · A → Z</div>
        </header>

        <!-- search -->
        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="🔍 Search commands, tools, repos…" />
            <div class="badge-count">📦 <strong id="countDisplay">0</strong> entries</div>
        </div>

        <!-- tabs -->
        <nav class="tabs" id="tabContainer">
            <button class="tab-btn active" data-tab="all"><span class="tab-icon">⊞</span> All</button>
            <button class="tab-btn" data-tab="cmd"><span class="tab-icon">⌨</span> Commands</button>
            <button class="tab-btn" data-tab="tool"><span class="tab-icon">🛠</span> Tools</button>
            <button class="tab-btn" data-tab="git"><span class="tab-icon">🔗</span> Git Clones</button>
            <button class="tab-btn" data-tab="repo"><span class="tab-icon">📂</span> Repos</button>
            <button class="tab-btn" data-tab="pkg"><span class="tab-icon">📦</span> Packages</button>
            <button class="tab-btn" data-tab="system"><span class="tab-icon">⚙</span> System</button>
            <button class="tab-btn" data-tab="network"><span class="tab-icon">🌐</span> Network</button>
            <button class="tab-btn" data-tab="effect"><span class="tab-icon">🎨</span> Effects</button>
        </nav>

        <!-- cards grid -->
        <div class="cards-grid" id="cardsGrid">
            <!-- cards will be rendered by JS -->
        </div>

        <!-- no results -->
        <div class="no-results" id="noResults">✨ No matches found — try a different keyword</div>

        <!-- footer -->
        <footer class="footer">
            <div>
                <span class="love">❤</span> LordvinCidev · Termux Encyclopedia
            </div>
            <div>
                <span>⚡</span> 2026 · <a href="#">github.com/lordvincidev</a>
            </div>
        </footer>
    </div>

    <script>
        // ──────────────────────────────────────────────
        //  PASSWORD (stored as comment for reference)
        //  // PASSWORD: lordvinciAH90
        // ──────────────────────────────────────────────

        const PREMIUM_PASSWORD = 'lordvinciAH90'; // stored in code, not shown on UI

        // ──────────────────────────────────────────────
        //  DATA  –  A–Z Termux Commands, Tools, Clones
        // ──────────────────────────────────────────────

        const entries = [

            // ── COMMANDS (cmd) ──
            {
                id: 'ls',
                category: 'cmd',
                command: 'ls',
                badge: 'core',
                desc: 'List directory contents with colors and options.',
                example: 'ls -la --color=auto',
                tags: ['file', 'basic']
            }, {
                id: 'cd',
                category: 'cmd',
                command: 'cd',
                badge: 'core',
                desc: 'Change the current working directory.',
                example: 'cd /data/data/com.termux/files/home',
                tags: ['navigation', 'basic']
            }, {
                id: 'pwd',
                category: 'cmd',
                command: 'pwd',
                badge: 'core',
                desc: 'Print the absolute path of the current directory.',
                example: 'pwd',
                tags: ['navigation', 'basic']
            }, {
                id: 'mkdir',
                category: 'cmd',
                command: 'mkdir',
                badge: 'core',
                desc: 'Create one or more new directories.',
                example: 'mkdir -p projects/termux/scripts',
                tags: ['file', 'basic']
            }, {
                id: 'rmdir',
                category: 'cmd',
                command: 'rmdir',
                badge: 'core',
                desc: 'Remove empty directories.',
                example: 'rmdir old_folder',
                tags: ['file', 'basic']
            }, {
                id: 'rm',
                category: 'cmd',
                command: 'rm',
                badge: 'core',
                desc: 'Remove files or directories (use -rf carefully!).',
                example: 'rm -rf temp/',
                tags: ['file', 'danger']
            }, {
                id: 'cp',
                category: 'cmd',
                command: 'cp',
                badge: 'core',
                desc: 'Copy files or directories from source to destination.',
                example: 'cp -r ~/backup ~/projects/',
                tags: ['file', 'basic']
            }, {
                id: 'mv',
                category: 'cmd',
                command: 'mv',
                badge: 'core',
                desc: 'Move or rename files and directories.',
                example: 'mv oldname.py newname.py',
                tags: ['file', 'basic']
            }, {
                id: 'touch',
                category: 'cmd',
                command: 'touch',
                badge: 'core',
                desc: 'Create an empty file or update its timestamp.',
                example: 'touch config.ini',
                tags: ['file', 'basic']
            }, {
                id: 'cat',
                category: 'cmd',
                command: 'cat',
                badge: 'core',
                desc: 'Concatenate and display file contents.',
                example: 'cat ~/.bashrc',
                tags: ['view', 'basic']
            }, {
                id: 'nano',

                example: 'hollywood',
                tags: ['fun', 'animation']
            }, {
                id: 'cmatrix',
                category: 'effect',
                command: 'cmatrix',
                badge: 'effect',
                desc: 'Matrix digital rain effect in the terminal (like the movie).',
                example: 'cmatrix -b',
                tags: ['fun', 'animation']
            }, {
                id: 'rxfetch',
                category: 'effect',
                command: 'rxfetch',
                badge: 'fetch',
                desc: 'Simple and fast system fetch script written in Rust.',
                example: 'rxfetch',
                tags: ['system', 'fetch']
            }, {
                id: 'figlet',
                category: 'effect',
                command: 'figlet',
                badge: 'ascii',
                desc: 'Generate ASCII art text banners from input.',
                example: 'figlet "Lordvin"',
                tags: ['ascii', 'fun']
            }, {
                id: 'toilet',
                category: 'effect',
                command: 'toilet',
                badge: 'ascii',
                desc: 'Colorful ASCII art text generator with various fonts.',
                example: 'toilet -f mono12 "Termux"',
                tags: ['ascii', 'fun']
            }
        ];

        // ──────────────────────────────────────────────
        //  RENDER ENGINE
        // ──────────────────────────────────────────────

        const grid = document.getElementById('cardsGrid');
        const searchInput = document.getElementById('searchInput');
        const countDisplay = document.getElementById('countDisplay');
        const noResults = document.getElementById('noResults');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const scrollTopBtn = document.getElementById('scrollTop');

        let activeTab = 'all';
        let searchQuery = '';
        let premiumUnlocked = false;

        // modal elements
        const modal = document.getElementById('premiumModal');
        const passwordInput = document.getElementById('passwordInput');
        const modalError = document.getElementById('modalError');
        const modalUnlockBtn = document.getElementById('modalUnlockBtn');
        const modalCancelBtn = document.getElementById('modalCancelBtn');

        function openModal() {
            modal.classList.add('open');
            passwordInput.value = '';
            modalError.textContent = '';
            passwordInput.focus();
        }

        function closeModal() {
            modal.classList.remove('open');
        }

        function attemptUnlock() {
            const entered = passwordInput.value.trim();
            if (entered === PREMIUM_PASSWORD) {
                premiumUnlocked = true;
                modalError.textContent = '✅ Unlocked!';
                modalError.className = 'success-msg';
                setTimeout(() => {
                    closeModal();
                    render();
                }, 600);
            } else {
                modalError.textContent = '❌ Incorrect password. Try again.';
                modalError.className = 'error-msg';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        modalUnlockBtn.addEventListener('click', attemptUnlock);
        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') attemptUnlock();
        });
        modalCancelBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        function render() {
            const filtered = entries.filter(entry => {
                if (activeTab !== 'all' && entry.category !== activeTab) return false;
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    const match =
                        entry.command.toLowerCase().includes(q) ||
                        entry.desc.toLowerCase().includes(q) ||
                        entry.tags.some(t => t.toLowerCase().includes(q)) ||
                        entry.id.toLowerCase().includes(q);
                    if (!match) return false;
                }
                return true;
            });

            countDisplay.textContent = filtered.length;
            noResults.classList.toggle('show', filtered.length === 0);

            if (filtered.length === 0) {
                grid.innerHTML = '';
                return;
            }

            let html = '';
            filtered.forEach(entry => {
                const isPremium = entry.premium === true;
                const isLocked = isPremium && !premiumUnlocked;

                const tagsHtml = entry.tags.map(t =>
                    `<span>${t}</span>`
                ).join('');

                let icon = '⌨';
                if (entry.category === 'tool') icon = '🛠';
                else if (entry.category === 'git') icon = '🔗';
                else if (entry.category === 'repo') icon = '📂';
                else if (entry.category === 'pkg') icon = '📦';
                else if (entry.category === 'system') icon = '⚙';
                else if (entry.category === 'network') icon = '🌐';
                else if (entry.category === 'effect') icon = '🎨';

                // premium badge
                const premiumBadgeHtml = isPremium ? `<span class="premium-badge">⭐ PREMIUM</span>` : '';

                // if locked, we show overlay
                let cardClass = 'card';
                if (isLocked) cardClass += ' premium-locked';

                // build example with lock if locked
                let exampleHtml = `<div class="example">${entry.example}</div>`;
                if (isLocked) {
                    exampleHtml = `<div class="example" style="filter:blur(3px);user-select:none;pointer-events:none;">${entry.example}</div>`;
                }

                // build tags with blur if locked
                let tagsHtmlFinal = `<div class="tags" style="${isLocked ? 'filter:blur(3px);pointer-events:none;user-select:none;' : ''}">${tagsHtml}</div>`;

                // overlay for locked
                let overlayHtml = '';
                if (isLocked) {
                    overlayHtml = `
                        <div class="lock-overlay" data-premium-id="${entry.id}">
                            <div class="lock-icon">🔒</div>
                            <div class="unlock-hint">Click to unlock premium</div>
                        </div>
                    `;
                }

                html += `
                    <div class="${cardClass}" data-id="${entry.id}" data-premium="${isPremium ? 'true' : 'false'}">
                        ${overlayHtml}
                        <div class="cmd">
                            <span>${icon} ${entry.command}</span>
                            <span class="badge">${entry.badge}</span>
                            ${premiumBadgeHtml}
                        </div>
                        <div class="desc">${entry.desc}</div>
                        ${exampleHtml}
                        ${tagsHtmlFinal}
                    </div>
                `;
            });
            grid.innerHTML = html;

            // attach click listeners for premium locked cards
            document.querySelectorAll('.card.premium-locked').forEach(card => {
                card.addEventListener('click', function(e) {
                    // prevent if click on overlay itself?
                    if (e.target.closest('.lock-overlay') || e.target.closest('.premium-badge')) {
                        openModal();
                    } else {
                        // also open if clicked elsewhere on card
                        openModal();
                    }
                });
            });
        }

        // ── search ──
        searchInput.addEventListener('input', () => {
            searchQuery = searchInput.value.trim();
            render();
        });

        // ── tabs ──
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeTab = btn.dataset.tab;
                render();
            });
        });

        // ── scroll to top ──
        window.addEventListener('scroll', () => {
            scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
        });
        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ── initial render ──
        render();

        // ── keyboard shortcut: focus search ──
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
            if (e.key === 'Escape') {
                searchInput.blur();
                searchInput.value = '';
                searchQuery = '';
                render();
            }
        });

        console.log('⚡ LordvinCidev · Termux A–Z loaded');
        console.log(`📦 ${entries.length} entries available`);
        // PASSWORD: lordvinciAH90  (for reference)
    </script>
</body>
</html>
